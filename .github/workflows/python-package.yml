# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python tests

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.tox-env == 'py312-torch-nightly' }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - python-version: "3.10"
          tox-env: py310
        - python-version: "3.11"
          tox-env: py311
        - python-version: "3.12"
          tox-env: py312
        - python-version: "3.13"
          tox-env: py313
        - python-version: "3.12"
          tox-env: py312-torch-min
        - python-version: "3.12"
          tox-env: py312-torch-nightly

    steps:
    - uses: actions/checkout@v4
    - name: Install uv (and Python ${{ matrix.python-version }})
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
    - name: Sync dev environment
      run: uv sync --locked
    - name: Lint check with ruff
      run: |
        uv run ruff check .
    - name: Check code formatting with ruff
      run: |
        uv run ruff format --check .
    - name: Run pytest (via tox -e ${{ matrix.tox-env }})
      run: |
        uvx --with tox-uv tox -e ${{ matrix.tox-env }}
    - name: Test installing package (pyproject-only metadata, no setup.py)
      run: |
        uv pip install .
